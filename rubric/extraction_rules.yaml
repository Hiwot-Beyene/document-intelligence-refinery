# Stage 2: Structure Extraction Layer (Multi-Strategy)
# Strategy A: Fast Text (pdfplumber/pymupdf) — native_digital + single_column; confidence gate below.
# Strategy B: Layout (Docling) — multi_column | table_heavy | figure_heavy | mixed.
# Strategy C: Vision (VLM) — scanned_image | form_fillable | A/B low confidence.
# Escalation guard: A/B measure confidence; if below threshold, retry with next strategy (confidence block).
triage:
  # Strategy A gate: meaningful character stream (char count > native_min_char_count per page)
  # and image area must not dominate (scanned_min_image_ratio threshold for scanned detection)
  native_min_char_count: 100
  scanned_max_char_count: 30
  scanned_min_image_ratio: 0.50
  scanned_pages_ratio_threshold: 0.85
  form_fillable_ratio_threshold: 0.20
  table_heavy_density_threshold: 0.15
  figure_heavy_density_threshold: 0.15
  multi_column_variation_threshold: 0.35
  single_column_max_table_density: 0.08
  single_column_max_variation: 0.20
  # When scanned and script/language uncertain (OSD "und", or "ru" false positive): use this. "am" = Amharic-heavy corpus.
  default_scanned_language: "am"
  # Use Tesseract OSD on first page to detect script (Latin/Ethiopic/etc.) for scanned docs with no text.
  detect_scanned_language_with_osd: true

confidence:
  # Escalation: A low confidence -> B; B low confidence -> C (Mandatory escalation guard)
  escalate_threshold_ab: 0.45
  escalate_threshold_bc: 0.40

layout:
  use_docling: false

vision:
  max_cost_per_doc_usd: 2.00
  estimated_cost_per_page_usd: 0.02
  require_approval_over_budget: false  # when true, pause and signal frontend for approval
  dpi: 150
  max_parallel_pages: 6
  prefer_vlm: true
  checkpoint_interval_pages: 5  # save checkpoint every N pages (reduces I/O; use 1 for every page)
  prefer_ocr_for_english_scanned: true  # use Tesseract for scanned English (faster than VLM)
  default_ocr_lang: "eng"  # fallback when language unknown
  prefer_surya_for_non_latin: true  # use Surya for non-Latin scripts when available
  max_vision_pages: 10  # cap VLM to this many pages; remaining pages always filled with OCR (100% extraction)
  full_extraction_required: true  # challenge: extract 100% of pages; any unfilled page gets OCR
  # Optional: show an "equivalent" cost for local OCR-only runs (no API $). e.g. 0.001 per page for tracking.
  ocr_virtual_cost_per_page_usd: 0.0

pageindex:
  max_sections_to_enrich: 10
  enrich_max_workers: 4
  use_llm_summary: false

model_selection:
  default_provider: ollama
  default_model: llama3.1:8b
  vision_provider: ollama
  vision_model: llava:7b
  paid_provider: openai
  paid_model: gpt-4o-mini
  max_query_cost_usd: 0.20
  prefer_local_for_low_complexity: true

chunking_constitution:
  table_cell_with_header: true
  figure_caption_attached: true
  list_unit_preserved: true
  parent_section_propagation: true
  cross_reference_links: true
